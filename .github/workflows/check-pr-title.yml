name: Check PR Title
on:
  pull_request:
    types: [ opened, reopened, edited, synchronize ]
jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ ! "$TITLE" =~ ^[A-Z] ]]; then
            echo "PR title must start with a capital letter"
            exit 1
          fi
